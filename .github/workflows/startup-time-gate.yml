name: Startup Time Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  startup-timing:
    name: Cold start < 4s
    runs-on: ubuntu-latest
    # Skip PRs from forks (no secrets / display available)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -q -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsqlite3-dev \
            libssl-dev

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-timing-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-timing-

      - name: Run startup timing unit tests
        working-directory: src-tauri
        run: cargo test startup_tests

      # Note: Full integration-level startup time measurement (launching Tauri,
      # reading tracing logs, asserting < 4s) requires a display server and
      # Tauri's `test` feature. The unit tests for validate_startup_duration
      # provide the fast-feedback proxy for now. Integration timing is planned
      # for Sub-phase 06 CI upgrade.
      - name: Verify startup time tests passed
        run: echo "Startup timing unit tests passed."
