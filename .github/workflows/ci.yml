name: CI

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Frontend lint, format, and type check
  # ─────────────────────────────────────────────────────────────────────────────
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint:check

      - name: Prettier format check
        run: pnpm run format:check

      - name: Check CHANGELOG has Unreleased entry (PRs to main only)
        if: github.base_ref == 'main'
        run: |
          if ! grep -qA 5 "## \[Unreleased\]" CHANGELOG.md | grep -q "^- \|^### "; then
            echo "ERROR: CHANGELOG.md must have at least one entry under [Unreleased] before merging to main."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Rust lint, format, and tests
  # ─────────────────────────────────────────────────────────────────────────────
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsqlite3-dev \
            libssl-dev

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy — deny warnings
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Frontend tests with coverage
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        run: pnpm run test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Tauri build validation (Windows MSVC target)
  # ─────────────────────────────────────────────────────────────────────────────
  tauri-build-check:
    name: Tauri Build Check
    runs-on: windows-latest
    needs: rust-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-win-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-win-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Validate Tauri build (no bundle)
        run: pnpm tauri build --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Security audit (runs on PRs to main/staging and on weekly schedule)
  # ─────────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       (github.base_ref == 'main' || github.base_ref == 'staging'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust dependency audit
        working-directory: src-tauri
        run: cargo audit --deny warnings

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm dependency audit
        run: pnpm audit --audit-level=high

      - name: Secret scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
